<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DRES AI</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:white;
}

header{
padding:18px;
text-align:center;
font-weight:bold;
background:linear-gradient(90deg,#6366f1,#22c55e);
}

nav{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
flex-wrap:wrap;
}

button{
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1f2937;
color:white;
}

button:hover{
background:#6366f1;
}

.container{padding:20px;}
.hidden{display:none;}

.card{
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:12px;
margin:10px 0;
}

.chatBox{
height:400px;
overflow-y:auto;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:12px;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{
background:#6366f1;
margin-left:auto;
text-align:right;
}

.ai{
background:#1f2937;
}

input{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
background:#111827;
color:white;
width:70%;
}
</style>
</head>

<body>

<header>DRES AI</header>

<nav>
<button onclick="show('tasks')">📚 Tareas</button>
<button onclick="show('chat')">💬 IA</button>
</nav>

<!-- TASKS -->
<div id="tasks" class="container">
<input id="taskInput" placeholder="Nueva tarea">
<input id="descInput" placeholder="Descripción">
<button onclick="addTask()">Agregar</button>
<div id="taskList"></div>
</div>

<!-- CHAT -->
<div id="chat" class="container hidden">

<div id="chatBox" class="chatBox"></div>

<input id="chatInput" placeholder="Escribe...">
<button onclick="send()">Enviar</button>

</div>

<script>

console.log("DRES AI ONLINE");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let mode = "profesor";
let isLoading = false;

/* ENTER */
chatInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* NAV */
function show(id){
["tasks","chat"].forEach(s=>{
document.getElementById(s).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

/* TASKS */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTask(){
let text = taskInput.value;
let desc = descInput.value;

if(!text) return;

tasks.push({text,desc});

taskInput.value="";
descInput.value="";

save();
render();
}

function render(){
taskList.innerHTML="";

tasks.forEach((t,i)=>{

let c = document.createElement("div");
c.className="card";

c.innerHTML = `<b>${t.text}</b><br><small>${t.desc||""}</small>`;

let b = document.createElement("button");
b.textContent="🧠 IA";
b.onclick=()=>askAI(t);

c.appendChild(b);
taskList.appendChild(c);

});
}

/* COMMANDS */
function handleCommand(text){

let t = text.toLowerCase().trim();

if(t==="modo examen"){
mode="examen";
addSystem("📝 Modo EXAMEN");
return true;
}

if(t==="modo profesor"){
mode="profesor";
addSystem("👨‍🏫 Modo PROFESOR");
return true;
}

if(t==="modo corto"){
mode="corto";
addSystem("⚡ Modo CORTO");
return true;
}

if(t==="limpiar"){
chatBox.innerHTML="";
addSystem("🧹 Chat limpio");
return true;
}

return false;
}

function addSystem(text){
chatBox.innerHTML += `<div class="msg ai" style="opacity:.6;text-align:center;">${text}</div>`;
}

/* AI TASK */
async function askAI(task){

if(isLoading) return;
isLoading = true;

let prompt = `[modo:${mode}] ${task.text} ${task.desc}`;

chatBox.innerHTML += `<div class="msg ai" id="thinking">🤖 Pensando...</div>`;

let res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

let data = await res.json();

document.getElementById("thinking")?.remove();

chatBox.innerHTML += `<div class="msg ai">${data.reply}</div>`;

isLoading = false;
}

/* CHAT */
async function send(){

let msg = chatInput.value;
if(!msg) return;

/* COMMANDS */
if(handleCommand(msg)){
chatInput.value="";
return;
}

if(isLoading) return;

isLoading = true;

chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
chatInput.value="";

chatBox.innerHTML += `<div class="msg ai" id="thinking">🤖 Pensando...</div>`;

try{

let res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`[modo:${mode}] ${msg}`})
});

let data = await res.json();

document.getElementById("thinking")?.remove();

chatBox.innerHTML += `<div class="msg ai">${data.reply}</div>`;

chatBox.scrollTop = chatBox.scrollHeight;

}catch(e){

document.getElementById("thinking")?.remove();
chatBox.innerHTML += `<div class="msg ai">❌ Error</div>`;
}

isLoading = false;
}

render();

</script>

</body>
</html>
