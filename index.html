<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DRES AI</title>

<style>

/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}

/* ===== THEMES ===== */
:root{
--bg:#0f172a;
--panel:#111827;
--text:#ffffff;
--user:#2563eb;
--ai:#1f2937;
--border:rgba(255,255,255,0.08);
}

body.light{
--bg:#f5f5f5;
--panel:#ffffff;
--text:#111;
--user:#2563eb;
--ai:#e5e7eb;
--border:rgba(0,0,0,0.1);
}

/* ===== LAYOUT ===== */
body{
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
}

/* TOP BAR */
header{
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid var(--border);
}

/* CHAT AREA */
#chatBox{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* MESSAGES */
.msg{
max-width:75%;
padding:12px 14px;
border-radius:14px;
line-height:1.4;
font-size:14px;
}

.user{
background:var(--user);
color:white;
align-self:flex-end;
}

.ai{
background:var(--panel);
border:1px solid var(--border);
align-self:flex-start;
}

/* INPUT BAR */
#inputArea{
display:flex;
padding:12px;
border-top:1px solid var(--border);
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:var(--panel);
color:var(--text);
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{opacity:.9}

/* THINKING */
#thinking{
opacity:.6;
font-style:italic;
}

</style>
</head>

<body>

<header>🤖 DRES AI — OpenAI Clone</header>

<div id="chatBox"></div>

<div id="inputArea">
<input id="chatInput" placeholder="Escribe un mensaje...">
<button onclick="send()">Enviar</button>
<button onclick="toggleTheme()">🌓</button>
</div>

<script>

let isLoading = false;

/* ENTER */
chatInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* COMMANDS */
let mode = "profesor";

function handleCommand(text){

text = text.toLowerCase().trim();

if(text==="modo examen"){mode="examen"; addSys("📝 examen"); return true;}
if(text==="modo profesor"){mode="profesor"; addSys("👨‍🏫 profe"); return true;}
if(text==="modo corto"){mode="corto"; addSys("⚡ corto"); return true;}
if(text==="limpiar"){chatBox.innerHTML=""; return true;}

return false;
}

function addSys(t){
chatBox.innerHTML += `<div class="msg ai" style="opacity:.5;text-align:center">${t}</div>`;
}

/* SEND */
async function send(){

let msg = chatInput.value;
if(!msg || isLoading) return;

/* COMMANDS */
if(handleCommand(msg)){
chatInput.value="";
return;
}

isLoading = true;

chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
chatInput.value="";

chatBox.innerHTML += `<div class="msg ai" id="thinking">Pensando...</div>`;

try{

let res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`[modo:${mode}] ${msg}`})
});

let data = await res.json();

document.getElementById("thinking")?.remove();

chatBox.innerHTML += `<div class="msg ai">${data.reply}</div>`;

chatBox.scrollTop = chatBox.scrollHeight;

}catch(e){

document.getElementById("thinking")?.remove();
chatBox.innerHTML += `<div class="msg ai">Error</div>`;
}

isLoading = false;
}

</script>

</body>
</html>
