<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRES AI</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            🤖 <span>DRES AI</span>
        </div>

        <button class="nav-btn active" onclick="showSection('chat')">
            💬 Chat
        </button>

        <button class="nav-btn" onclick="showSection('tasks')">
            📚 Tareas
        </button>

        <button class="nav-btn" onclick="showSection('dashboard')">
            📊 Dashboard
        </button>

        <div class="sidebar-footer">
            <small>DRES AI v2</small>
        </div>

    </aside>


    <!-- Main -->
    <main class="main-content">

        <!-- CHAT -->
        <section id="chat-section" class="section">

            <div class="page-header">
                <h1>DRES AI</h1>
                <p>Tu tutor inteligente.</p>
            </div>

            <div class="suggestions">

                <div class="suggestion-card"
                     onclick="useSuggestion('Explícame derivadas paso a paso')">
                    📘 Derivadas
                </div>

                <div class="suggestion-card"
                     onclick="useSuggestion('Ayúdame a estudiar física')">
                    ⚛️ Física
                </div>

                <div class="suggestion-card"
                     onclick="useSuggestion('Hazme un examen de matemáticas')">
                    📝 Examen
                </div>

                <div class="suggestion-card"
                     onclick="useSuggestion('Explícame historia como profesor')">
                    🏛️ Historia
                </div>

            </div>

            <div id="chatBox" class="chat-box">

                <div class="ai-message welcome">
                    👋 Hola. Soy DRES AI.<br><br>
                    Estoy listo para ayudarte.
                </div>

            </div>

            <div id="typingIndicator" class="typing hidden">
                🤖 DRES AI está pensando...
            </div>

            <div class="chat-input-container">

                <textarea
                    id="chatInput"
                    placeholder="Pregunta lo que quieras..."
                    rows="1"></textarea>

                <button id="sendBtn" onclick="sendMessage()">
                    Enviar
                </button>

            </div>

        </section>


        <!-- TAREAS -->
        <section id="tasks-section" class="section hidden">

            <div class="page-header">
                <h1>📚 Tareas</h1>
                <p>Organiza y consulta con IA.</p>
            </div>

            <div class="task-form">

                <input
                    type="text"
                    id="taskTitle"
                    placeholder="Título de la tarea">

                <textarea
                    id="taskDescription"
                    placeholder="Descripción"></textarea>

                <button onclick="addTask()">
                    ➕ Agregar tarea
                </button>

            </div>

            <div id="tasksList">

            </div>

        </section>


        <!-- DASHBOARD -->
        <section id="dashboard-section" class="section hidden">

            <div class="page-header">
                <h1>📊 Dashboard</h1>
                <p>Tu progreso.</p>
            </div>

            <div class="stats-grid">

                <div class="stat-card">
                    <h2 id="totalTasks">0</h2>
                    <p>Tareas</p>
                </div>

                <div class="stat-card">
                    <h2 id="completedTasks">0</h2>
                    <p>Completadas</p>
                </div>

                <div class="stat-card">
                    <h2 id="chatCount">0</h2>
                    <p>Mensajes</p>
                </div>

            </div>

        </section>

    </main>


    <script src="app.js"></script>

</body>
</html>

</body>
</html>
