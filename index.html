<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DRES AI 0.1.0</title>

<style>

/* ===== DARK SAAS STYLE ===== */
body{
margin:0;
font-family:system-ui;
background:#0a0a0a;
color:#fff;
display:flex;
height:100vh;
}

header{
padding:14px;
text-align:center;
background:#111;
border-bottom:1px solid #222;
font-weight:600;
}

/* LAYOUT */
.sidebar{
width:260px;
background:#111;
border-right:1px solid #222;
padding:10px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT */
#chatBox{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:70%;
padding:10px;
border-radius:10px;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.ai{
background:#1a1a1a;
border:1px solid #222;
align-self:flex-start;
}

/* INPUT */
#inputArea{
display:flex;
gap:10px;
padding:10px;
border-top:1px solid #222;
}

input{
flex:1;
padding:10px;
background:#111;
border:1px solid #222;
color:white;
border-radius:8px;
}

button{
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

/* TASKS */
.task{
background:#111;
border:1px solid #222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.task-title{
font-weight:600;
}

.task-panel{
display:none;
margin-top:10px;
padding:10px;
border-top:1px solid #222;
}

.task.open .task-panel{
display:block;
}

.task-actions{
display:flex;
gap:5px;
margin-top:5px;
}

.smallBtn{
background:#222;
font-size:12px;
padding:5px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>📚 Tareas</h3>
<input id="taskInput" placeholder="Título">
<input id="descInput" placeholder="Descripción">
<button onclick="addTask()">Agregar</button>

<div id="taskList"></div>
</div>

<!-- MAIN -->
<div class="main">

<header> DRES AI 0.1.0</header>

<div id="chatBox"></div>

<div id="inputArea">
<input id="chatInput" placeholder="Escribe...">
<button onclick="send()">Enviar</button>
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let chatBox = document.getElementById("chatBox");

/* ===== CHAT ===== */
async function send(){

let msg = chatInput.value;
if(!msg) return;

chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
chatInput.value="";

chatBox.innerHTML += `<div class="msg ai" id="thinking">Pensando...</div>`;

let res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:msg})
});

let data = await res.json();

document.getElementById("thinking")?.remove();

chatBox.innerHTML += `<div class="msg ai">${data.reply}</div>`;
}

/* ===== TASKS ===== */
function addTask(){

let t = taskInput.value;
let d = descInput.value;

if(!t) return;

tasks.push({
title:t,
desc:d,
chat:[]
});

save();
renderTasks();
}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

/* OPEN TASK PANEL */
function toggleTask(i){
tasks[i].open = !tasks[i].open;
renderTasks();
}

/* TASK CHAT */
async function sendTask(i, input){

let task = tasks[i];

task.chat.push({
role:"user",
content:`TAREA: ${task.title} - ${task.desc}\n\nUsuario: ${input}`
});

let res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:`Analiza esta tarea:\nTitulo: ${task.title}\nDescripcion: ${task.desc}\nPregunta: ${input}`
})
});

let data = await res.json();

task.chat.push({
role:"ai",
content:data.reply
});

save();
renderTasks();
}

/* RENDER TASKS */
function renderTasks(){

taskList.innerHTML="";

tasks.forEach((t,i)=>{

let div = document.createElement("div");
div.className="task "+(t.open?"open":"");

div.innerHTML=`
<div class="task-title">${t.title}</div>
<div>${t.desc||""}</div>

<div class="task-actions">
<button class="smallBtn" onclick="toggleTask(${i})">Abrir</button>
<button class="smallBtn" onclick="deleteTask(${i})">Eliminar</button>
</div>

<div class="task-panel">
<div id="chat-${i}"></div>

<input id="input-${i}" placeholder="pregunta a IA">
<button onclick="sendTask(${i}, document.getElementById('input-${i}').value)">Enviar</button>
</div>
`;

taskList.appendChild(div);

/* render chat */
setTimeout(()=>{
let c = document.getElementById("chat-"+i);
if(!c) return;

c.innerHTML = (t.chat||[]).map(m=>{
return `<div class="msg ${m.role==='user'?'user':'ai'}">${m.content}</div>`;
}).join("");

},10);

});

}

/* DELETE */
function deleteTask(i){
tasks.splice(i,1);
save();
renderTasks();
}

renderTasks();

</script>

</body>
</html>
