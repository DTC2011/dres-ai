<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DRES AI PRO0.0.9</title>

<style>

/* ===== THEME ===== */
:root{
--bg:#0f172a;
--panel:#111827;
--text:#fff;
--border:rgba(255,255,255,0.08);
--user:#2563eb;
--ai:#1f2937;
}

body.light{
--bg:#f5f5f5;
--panel:#fff;
--text:#111;
--border:rgba(0,0,0,0.1);
--user:#2563eb;
--ai:#e5e7eb;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid var(--border);
}

/* NAV */
nav{
display:flex;
gap:10px;
justify-content:center;
padding:10px;
border-bottom:1px solid var(--border);
flex-wrap:wrap;
}

/* BUTTON */
button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:var(--panel);
color:var(--text);
border:1px solid var(--border);
}

button:hover{
background:#2563eb;
color:white;
}

/* CONTAINERS */
.container{
display:none;
padding:20px;
}

.active{
display:block;
}

/* CHAT */
#chatBox{
height:55vh;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:10px;
}

.msg{
max-width:75%;
padding:12px;
border-radius:12px;
}

.user{
background:var(--user);
align-self:flex-end;
color:white;
}

.ai{
background:var(--panel);
border:1px solid var(--border);
align-self:flex-start;
}

/* INPUT */
#inputArea{
display:flex;
gap:10px;
padding:10px;
border-top:1px solid var(--border);
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--panel);
color:var(--text);
}

/* TASKS */
.card{
background:var(--panel);
border:1px solid var(--border);
padding:12px;
border-radius:12px;
margin-bottom:10px;
transition:all .35s ease;
}

.task-exit{
transform:translateX(120%);
opacity:0;
}

.done{
opacity:0.5;
text-decoration:line-through;
}

</style>
</head>

<body>

<header>🤖 DRES AI PRO MAX</header>

<nav>
<button onclick="show('chat')">💬 Chat</button>
<button onclick="show('tasks')">📚 Tareas</button>
<button onclick="show('board')">🧠 Pizarrón</button>
<button onclick="toggleTheme()">🌓</button>
</nav>

<!-- CHAT -->
<div id="chat" class="container active">

<div id="chatBox"></div>

<div id="inputArea">
<input id="chatInput" placeholder="Escribe...">
<button onclick="send()">Enviar</button>
</div>

</div>

<!-- TASKS -->
<div id="tasks" class="container">

<input id="taskInput" placeholder="Nueva tarea">
<input id="descInput" placeholder="Descripción">
<button onclick="addTask()">Agregar</button>

<div id="taskList"></div>

</div>

<!-- BOARD -->
<div id="board" class="container">
<div id="boardList"></div>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let mode = "profesor";
let loading = false;

/* NAV */
function show(id){
document.querySelectorAll(".container").forEach(c=>c.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleTheme(){
document.body.classList.toggle("light");
}

/* ENTER */
chatInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* COMMANDS */
function handleCommand(text){

text = text.toLowerCase().trim();

if(text==="modo examen"){mode="examen"; return true;}
if(text==="modo profesor"){mode="profesor"; return true;}
if(text==="modo corto"){mode="corto"; return true;}
if(text==="limpiar"){chatBox.innerHTML=""; return true;}

return false;
}

/* CHAT */
async function send(){

let msg = chatInput.value;
if(!msg || loading) return;

if(handleCommand(msg)){
chatInput.value="";
return;
}

loading = true;

chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
chatInput.value="";

chatBox.innerHTML += `<div class="msg ai" id="thinking">Pensando...</div>`;

let res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`[modo:${mode}] ${msg}`})
});

let data = await res.json();

document.getElementById("thinking")?.remove();

chatBox.innerHTML += `<div class="msg ai">${data.reply}</div>`;

chatBox.scrollTop = chatBox.scrollHeight;

loading = false;
}

/* TASKS */
function addTask(){

let t = taskInput.value;
let d = descInput.value;

if(!t) return;

tasks.push({text:t,desc:d,done:false});
save();
renderTasks();
}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

/* TASK RENDER */
function renderTasks(){

taskList.innerHTML="";

tasks.forEach((t,i)=>{

let c=document.createElement("div");
c.className="card "+(t.done?"done":"");

c.innerHTML=`<b>${t.text}</b><br><small>${t.desc||""}</small>`;

/* IA BUTTON */
let ai=document.createElement("button");
ai.textContent="🧠 IA";
ai.onclick=async ()=>{

chatBox.innerHTML += `
<div class="msg user">📚 ${t.text}</div>
<div class="msg ai" id="thinking">Pensando...</div>
`;

let res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:`Explica esta tarea paso a paso: ${t.text} ${t.desc||""}`
})
});

let data = await res.json();

document.getElementById("thinking")?.remove();

chatBox.innerHTML += `<div class="msg ai">${data.reply}</div>`;
};

/* DELETE ANIMATED */
let del=document.createElement("button");
del.textContent="🗑️";
del.onclick=()=>{

c.classList.add("task-exit");

setTimeout(()=>{
tasks.splice(i,1);
save();
renderTasks();
},350);

};

/* DONE */
let done=document.createElement("button");
done.textContent="✓";
done.onclick=()=>{

tasks[i].done=!tasks[i].done;
save();
renderTasks();
renderBoard();

};

c.appendChild(ai);
c.appendChild(done);
c.appendChild(del);

taskList.appendChild(c);

});

renderBoard();
}

/* BOARD */
function renderBoard(){

boardList.innerHTML="";

tasks.forEach(t=>{

let c=document.createElement("div");
c.className="card "+(t.done?"done":"");

c.innerHTML=`<b>${t.text}</b><br><small>${t.desc||""}</small>`;

boardList.appendChild(c);

});
}

renderTasks();

</script>

</body>
</html>
